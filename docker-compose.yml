version: '3.8'
services:
  opdshelf:
    build: .
    container_name: opdshelf
    ports:
      - "3000:3000"
    volumes:
      - ./books:/app/books
      - ./covers:/app/covers
      - ./data:/app/data
    restart: unless-stopped
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - BOOKS_DIR=./books
      # Optional: Set admin credentials
      # - ADMIN_USERNAME=admin
      # - ADMIN_PASSWORD=yourpassword
